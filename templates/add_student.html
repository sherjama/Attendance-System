{% extends 'base.html' %} {% block content %}

<div style="max-width: 500px;">
  <div class="page-header">
    <div>
      <div class="page-title">Add Student</div>
      <div class="page-subtitle">Enrolling in {{ classroom.class_name }}</div>
    </div>
    <a href="{{ url_for('class_details', id=classroom.id) }}" class="btn-outline">
      <i class="bi bi-arrow-left"></i> Back
    </a>
  </div>

  <div class="a-card">
    <form method="POST">
      <div style="margin-bottom: 20px;">
        <label class="a-label">Student Name</label>
        <input type="text" name="name" class="a-input" placeholder="Enter full name" required />
      </div>

      <div style="margin-bottom: 20px;">
        <label class="a-label">Roll Number</label>
        <input type="text" name="roll_number" class="a-input" placeholder="e.g. 101, A-23..." required />
      </div>

      <div style="margin-bottom: 28px;">
        <label class="a-label">Class</label>
        <select name="classroom_id" class="a-input">
          {% if classroom %}
          <option value="{{ classroom.id }}" selected>{{ classroom.class_name }}</option>
          {% else %}
            {% for c in classes %}
            <option value="{{ c.id }}">{{ c.class_name }}</option>
            {% endfor %}
          {% endif %}
        </select>
      </div>

      <div style="display: flex; gap: 12px;">
        <button type="submit" class="btn-accent" style="flex: 1; justify-content: center; padding: 12px;">
          <i class="bi bi-person-plus"></i> Add Student
        </button>
        <a href="{{ url_for('class_details', id=classroom.id) }}" class="btn-outline" style="padding: 12px 20px;">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
