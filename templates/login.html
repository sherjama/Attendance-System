{% extends 'base.html' %} {% block content %}

<div style="min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 20px;">
  <div style="width: 100%; max-width: 420px;">

    <!-- LOGO -->
    <div style="text-align: center; margin-bottom: 36px;">
      <div style="width: 56px; height: 56px; background: var(--accent); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 16px;">📋</div>
      <div style="font-size: 1.8rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em;">AttendPro</div>
      <div style="color: var(--text-muted); font-size: 0.88rem; margin-top: 6px;">Sign in to your account</div>
    </div>

    <!-- CARD -->
    <div class="a-card" style="padding: 36px;">
      <form method="POST">
        <div style="margin-bottom: 20px;">
          <label class="a-label">Username</label>
          <input type="text" name="username" class="a-input" placeholder="Enter your username" required />
        </div>

        <div style="margin-bottom: 28px;">
          <label class="a-label">Password</label>
          <input type="password" name="password" class="a-input" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn-accent" style="width: 100%; justify-content: center; padding: 13px;">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <div style="text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-muted);">
        Don't have an account?
        <a href="{{ url_for('register') }}" style="color: var(--accent); font-weight: 600; text-decoration: none;"> Register here</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
